<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Match - Profile</title>

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/profile.css" />
    <link rel="stylesheet" href="css/about.css" />

    <script src="js/profile.js" defer></script>
  </head>
  <body>
    <header class="header-matches">
      <nav class="about-nav">
        <div class="nav-left">
          <a href="about.html">About</a>
          <a href="matches.html">Matches</a>
        </div>

        <div class="nav-center">
          <a href="index.html">
            <img src="images/heromatch.png" alt="Match logo" class="nav-logo" />
          </a>
        </div>

        <div class="nav-right">
          <a href="#" class="signup-btn">Sign up</a>
        </div>
      </nav>
    </header>
    <main class="page">
      <p class="top-text">Your filters found me</p>

      <h1 class="title">Time to talk,<br />what are you waiting for?</h1>

      <section class="profile">
        <div class="image-box">
          <img id="user-image" class="image" src="" alt="Profile image" />
        </div>

        <div class="info">
          <h2 id="user-name" class="name"></h2>
          <p id="user-age-city" class="text"></p>

          <div class="tags">
            <span id="tag-eye" class="tag">Eye color</span>
            <span id="tag-hair-type" class="tag">Hair type</span>
            <span id="tag-hair-color" class="tag">Hair color</span>
          </div>
        </div>
      </section>

      <section class="details">
        <h3 class="details-title">More details</h3>

        <div class="grid">
          <div class="item">
            <p class="label">HEIGHT</p>
            <p id="user-height" class="value"></p>
          </div>

          <div class="item">
            <p class="label">HAIR TYPE</p>
            <p id="user-hair-type" class="value"></p>
          </div>

          <div class="item">
            <p class="label">WORK</p>
            <p id="user-work" class="value"></p>
          </div>

          <div class="item">
            <p class="label">EYE COLOR</p>
            <p id="user-eye" class="value"></p>
          </div>
        </div>
      </section>

      <button class="btn">SEND ME A MESSAGE</button>
    </main>
    <footer class="about-footer">
      <div class="footer-left">
        <img src="images/heromatch.png" alt="Match logo" class="footer-logo" />

        <div class="socials">
          <a href="#"><img src="images/Vectorfacebook.svg" alt="Facebook" class="fb" /></a>
          <a href="#"><img src="images/Vektorinsta.svg" alt="Instagram" class="insta" /></a>
        </div>
      </div>

      <div class="footer-right">
        <h3>More</h3>
        <a href="about.html">About</a>
        <a href="profile.html">Profile</a>
        <a href="matches.html">Matches</a>
      </div>
    </footer>
  </body>
</html>
